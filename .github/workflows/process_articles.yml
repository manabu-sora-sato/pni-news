name: Process Articles

on:
  workflow_run:
    workflows: ["Fetch RSS"]
    types:
      - completed
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. スクリプト実行前の「綺麗な状態」で先に最新データをプルする
      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 2. ここでスクリプトが走り、ファイルが更新される
      - name: Process articles with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process_articles.py

      # 3. 競合のリスクがない状態で安全にコミット＆プッシュする（--rebaseは不要になります）
      - name: Commit and push processed data
        run: |
          git add data/processed_news.jsonl
          git diff --staged --quiet || git commit -m "chore: process articles $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
          
      - name: Sync data to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/cryuff/pni-news hf_space
          mkdir -p hf_space/data
          cp data/processed_news.jsonl hf_space/data/
          cp data/raw_news.jsonl hf_space/data/
          cd hf_space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "sync: update data from GitHub" && git push)
