name: Fetch RSS

on:
  schedule:
    - cron: '0 21,3,9 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. 最初に最新のリポジトリ状態を取得
      - name: Pull latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 2. RSSを取得し、data/raw_news.jsonl に書き込み
      - name: Fetch RSS feeds
        run: python fetch_rss.py

      # 3. 正しく raw_news.jsonl を指定してGitHubに保存
      - name: Commit and push raw data
        run: |
          git add data/raw_news.jsonl
          git diff --staged --quiet || git commit -m "chore: fetch rss data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
