name: Fetch RSS

on:
  schedule:
    - cron: '0 21,3,9 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS feeds
        run: python fetch_rss.py

      - name: Commit and push raw data
        run: |
          mkdir -p data
          touch data/raw_news.jsonl
          git add data/raw_news.jsonl
          git diff --staged --quiet || git commit -m "chore: fetch rss data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
