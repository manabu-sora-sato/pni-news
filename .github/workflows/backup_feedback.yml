name: Backup Feedback Data

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分ごと
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download feedback from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # パラメータではなく、ヘッダーに秘密の合言葉を仕込んでリクエスト
          curl -s -L -H "X-Download-Token: pni-secure-sync" \
            "https://cryuff-pni-news.hf.space/" \
            -o data/user_feedback_log.jsonl

      - name: Commit and push feedback backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/user_feedback_log.jsonl
          git diff --staged --quiet || git commit -m "backup: feedback log $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
